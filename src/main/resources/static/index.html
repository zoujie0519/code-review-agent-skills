<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Review Agent - 智能代码审查</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #FEFEFE;
            --bg-secondary: #F8FAFB;
            --bg-tertiary: #EEF2F5;
            --accent-primary: #0EA5E9;
            --accent-secondary: #06B6D4;
            --accent-gradient: linear-gradient(135deg, #0EA5E9 0%, #06B6D4 50%, #10B981 100%);
            --accent-glow: rgba(14, 165, 233, 0.15);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --border-light: #E2E8F0;
            --border-medium: #CBD5E1;
            --success: #10B981;
            --success-bg: #ECFDF5;
            --warning: #F59E0B;
            --warning-bg: #FFFBEB;
            --error: #EF4444;
            --error-bg: #FEF2F2;
            --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 6px 16px rgba(0, 0, 0, 0.04);
            --card-shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.06), 0 16px 32px rgba(0, 0, 0, 0.06);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Animated background pattern */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(14, 165, 233, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(6, 182, 212, 0.02) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(14, 165, 233, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: var(--accent-gradient);
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(14, 165, 233, 0.25);
            position: relative;
            overflow: hidden;
        }

        .logo-badge::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255, 255, 255, 0.2) 50%,
                transparent 60%
            );
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .logo-badge svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        .header h1 {
            font-size: 2.75rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .header h1 span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            animation: fadeInUp 0.6s ease-out 0.1s backwards;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--error);
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 50%;
            background: inherit;
            opacity: 0.3;
            animation: pulse-ring 2s infinite;
        }

        .status-dot.online {
            background: var(--success);
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.3); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        .status-text {
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .api-url {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
        }

        /* Main Card */
        .main-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out 0.2s backwards;
        }

        /* Sample Code Section */
        .sample-section {
            padding: 20px 24px;
            background: linear-gradient(135deg, var(--warning-bg) 0%, #FEF3E2 100%);
            border-bottom: 1px solid rgba(245, 158, 11, 0.15);
        }

        .sample-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .sample-header svg {
            width: 20px;
            height: 20px;
            color: var(--warning);
        }

        .sample-header span {
            font-size: 0.9375rem;
            font-weight: 600;
            color: #B45309;
        }

        .sample-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .sample-btn {
            padding: 10px 18px;
            background: var(--bg-primary);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sample-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            transform: translateY(-1px);
        }

        .sample-btn:active {
            transform: translateY(0);
        }

        /* Input Section */
        .input-section {
            padding: 24px;
        }

        .input-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .input-label label {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .char-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .code-input {
            width: 100%;
            min-height: 320px;
            padding: 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.7;
            color: var(--text-primary);
            resize: vertical;
            transition: all 0.25s ease;
        }

        .code-input::placeholder {
            color: var(--text-muted);
        }

        .code-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: var(--bg-primary);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        /* Button Group */
        .button-group {
            display: flex;
            gap: 12px;
            padding: 0 24px 24px;
        }

        .btn {
            flex: 1;
            padding: 14px 28px;
            border: none;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 16px rgba(14, 165, 233, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(14, 165, 233, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border-medium);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* Error Message */
        .error-message {
            margin: 0 24px 24px;
            padding: 16px 20px;
            background: var(--error-bg);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius-md);
            display: none;
            align-items: flex-start;
            gap: 12px;
        }

        .error-message.show {
            display: flex;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .error-message svg {
            width: 20px;
            height: 20px;
            color: var(--error);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .error-message span {
            color: #B91C1C;
            font-size: 0.9375rem;
        }

        /* Loading State */
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 48px 24px;
        }

        .loading.show {
            display: flex;
        }

        .spinner-container {
            position: relative;
            width: 64px;
            height: 64px;
            margin-bottom: 24px;
        }

        .spinner {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid var(--border-light);
            border-radius: 50%;
        }

        .spinner:nth-child(1) {
            border-top-color: var(--accent-primary);
            animation: spin 1s linear infinite;
        }

        .spinner:nth-child(2) {
            width: 48px;
            height: 48px;
            top: 8px;
            left: 8px;
            border-right-color: var(--accent-secondary);
            animation: spin 1.5s linear infinite reverse;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.0625rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .loading-subtext {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Result Section */
        .result-section {
            display: none;
            border-top: 1px solid var(--border-light);
        }

        .result-section.show {
            display: block;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-light);
        }

        .result-header h2 {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-header h2 svg {
            width: 22px;
            height: 22px;
            color: var(--accent-primary);
        }

        .execution-time {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--success-bg);
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #059669;
        }

        .report-output {
            padding: 24px;
            background: var(--bg-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.8;
            color: var(--text-primary);
            white-space: pre;
            word-break: normal;
            max-height: 500px;
            overflow: auto;
        }

        .report-output::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .report-output::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        .report-output::-webkit-scrollbar-thumb {
            background: var(--border-medium);
            border-radius: 4px;
        }

        .report-output::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .report-output::-webkit-scrollbar-corner {
            background: var(--bg-tertiary);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 32px;
            padding: 20px;
            animation: fadeInUp 0.6s ease-out 0.3s backwards;
        }

        .footer p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: var(--accent-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .status-bar {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .sample-buttons {
                justify-content: center;
            }

            .button-group {
                flex-direction: column;
            }

            .result-header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
        }

        /* Code syntax highlighting hint */
        .code-input:focus {
            background-image:
                linear-gradient(var(--bg-primary) 50%, transparent 50%);
            background-size: 100% 3.4em;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <header class="header">
            <div class="logo-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                </svg>
            </div>
            <h1>Code Review <span>Agent</span></h1>
            <p>基于 Spring AI + Agent Skills 的智能代码审查系统</p>
        </header>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">检查服务状态...</span>
            </div>
            <div class="api-url" id="apiUrl">http://localhost:8080</div>
        </div>

        <div class="main-card">
            <div class="sample-section">
                <div class="sample-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                    <span>快速测试 - 点击加载示例代码</span>
                </div>
                <div class="sample-buttons">
                    <button class="sample-btn" onclick="loadSample('good')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        优质代码
                    </button>
                    <button class="sample-btn" onclick="loadSample('bad')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                        </svg>
                        问题代码
                    </button>
                    <button class="sample-btn" onclick="loadSample('security')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        安全问题
                    </button>
                    <button class="sample-btn" onclick="clearCode()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        清空
                    </button>
                </div>
            </div>

            <div class="input-section">
                <div class="input-label">
                    <label for="codeInput">请输入要审查的 Java 代码</label>
                    <span class="char-count" id="charCount">0 字符</span>
                </div>
                <textarea
                    id="codeInput"
                    class="code-input"
                    placeholder="// 在这里粘贴你的 Java 代码...
public class Example {
    public void method() {
        System.out.println(&quot;Hello World&quot;);
    }
}"
                ></textarea>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" id="reviewBtn" onclick="submitReview()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    开始审查
                </button>
                <button class="btn btn-secondary" onclick="clearResult()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                    清除结果
                </button>
            </div>

            <div class="error-message" id="errorMessage">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span id="errorText"></span>
            </div>

            <div class="loading" id="loading">
                <div class="spinner-container">
                    <div class="spinner"></div>
                    <div class="spinner"></div>
                </div>
                <p class="loading-text">正在进行智能代码审查</p>
                <p class="loading-subtext">AI 正在分析代码风格、安全性、性能和最佳实践</p>
            </div>

            <div class="result-section" id="resultSection">
                <div class="result-header">
                    <h2>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        审查报告
                    </h2>
                    <span class="execution-time" id="executionTime">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <span id="timeValue">0</span>ms
                    </span>
                </div>
                <div class="report-output" id="reportOutput"></div>
            </div>
        </div>

        <footer class="footer">
            <p>Powered by <a href="#">Spring AI</a> & <a href="#">Claude Agent Skills</a></p>
        </footer>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';

        // 页面加载时检查服务状态
        window.onload = function() {
            checkHealth();
            setupCharCounter();
        };

        // 字符计数器
        function setupCharCounter() {
            const codeInput = document.getElementById('codeInput');
            const charCount = document.getElementById('charCount');

            codeInput.addEventListener('input', function() {
                const count = this.value.length;
                charCount.textContent = `${count.toLocaleString()} 字符`;
            });
        }

        // 检查服务健康状态
        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/api/review/health`);
                if (response.ok) {
                    document.getElementById('statusDot').classList.add('online');
                    document.getElementById('statusText').textContent = '服务正常运行';
                } else {
                    throw new Error('服务异常');
                }
            } catch (error) {
                document.getElementById('statusText').textContent = '服务未启动或无法连接';
                showError('无法连接到服务器，请确保应用已启动在 http://localhost:8080');
            }
        }

        // 提交代码审查
        async function submitReview() {
            const code = document.getElementById('codeInput').value.trim();

            if (!code) {
                showError('请输入要审查的代码');
                return;
            }

            // 隐藏之前的结果和错误
            hideError();
            document.getElementById('resultSection').classList.remove('show');

            // 显示加载状态
            document.getElementById('loading').classList.add('show');
            document.getElementById('reviewBtn').disabled = true;

            try {
                const startTime = Date.now();
                const response = await fetch(`${API_BASE}/api/review/code`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        code: code,
                        fileName: 'Test.java'
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const executionTime = Date.now() - startTime;

                // 显示结果
                showResult(data.report, data.executionTimeMs || executionTime);

            } catch (error) {
                showError(`审查失败: ${error.message}`);
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('reviewBtn').disabled = false;
            }
        }

        // 显示结果
        function showResult(report, executionTime) {
            document.getElementById('reportOutput').textContent = report;
            document.getElementById('timeValue').textContent = executionTime;
            document.getElementById('resultSection').classList.add('show');

            // 滚动到结果区域
            document.getElementById('resultSection').scrollIntoView({
                behavior: 'smooth',
                block: 'start'
            });
        }

        // 显示错误
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            document.getElementById('errorText').textContent = message;
            errorDiv.classList.add('show');
        }

        // 隐藏错误
        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        // 清除结果
        function clearResult() {
            document.getElementById('resultSection').classList.remove('show');
            hideError();
        }

        // 清空代码
        function clearCode() {
            document.getElementById('codeInput').value = '';
            document.getElementById('charCount').textContent = '0 字符';
            clearResult();
        }

        // 加载示例代码
        function loadSample(type) {
            const samples = {
                good: `package com.example;

/**
 * 用户服务类
 * @author Jensen
 */
public class UserService {

    private final UserRepository userRepository;

    public UserService(UserRepository userRepository) {
        this.userRepository = userRepository;
    }

    /**
     * 根据ID获取用户
     * @param userId 用户ID
     * @return 用户对象
     */
    public User getUserById(Long userId) {
        if (userId == null) {
            throw new IllegalArgumentException("用户ID不能为空");
        }
        return userRepository.findById(userId)
                .orElseThrow(() -> new RuntimeException("用户不存在"));
    }
}`,
                bad: `public class Test {
    public void method() {
        String name = "world";
        System.out.println("Hello " + name);

        // 空catch块
        try {
            int result = 10 / 0;
        } catch (Exception e) {
        }

        // 使用==比较字符串
        if (name == "test") {
            System.out.println("match");
        }

        // 魔法数字
        if (age > 18) {
            System.out.println("adult");
        }
    }
}`,
                security: `public class SecurityExample {

    public void loginUser(String username, String password) {
        // SQL注入风险
        String sql = "SELECT * FROM users WHERE username='" + username + "'";

        // 硬编码密码
        String adminPassword = "admin123";

        if (password.equals(adminPassword)) {
            System.out.println("Login successful");
        }
    }

    public void processFile(String filePath) {
        // 资源可能未关闭
        FileInputStream fis = new FileInputStream(filePath);
        // 处理文件...
    }
}`
            };

            const codeInput = document.getElementById('codeInput');
            codeInput.value = samples[type];
            document.getElementById('charCount').textContent = `${samples[type].length.toLocaleString()} 字符`;
            clearResult();
        }
    </script>
</body>
</html>
